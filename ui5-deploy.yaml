# yaml-language-server: $schema=https://sap.github.io/ui5-tooling/schema/ui5.yaml.json

specVersion: "4.0"
metadata:
  name: br.com.gamma.zuiiscockpitassist
type: application
builder:
  resources:
    excludes:
      - /test/**
      - /localService/**
  customTasks:
    - name: deploy-to-abap
      afterTask: generateCachebusterInfo
      configuration:
        target:
          url: https://my430374.s4hana.cloud.sap/
          authenticationType: reentranceTicket # SAML support for vscode
        app:
          name: ZUIISCOCKPITASS
          description: Inside Sales - Cockpit do Assistente
          package: ZRAP_COCKPIT_ASSISTENTE
          transport: BWPK900129
        exclude:
          - /test/
